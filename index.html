let dataKalah = {};
let intervalUpdate = null;

// Ambil data dari database
function ambilDatabase() {
    fetch(DATABASE_URL + "?t=" + Date.now(), { cache: "no-store" })
        .then(res => {
            if (!res.ok) throw new Error("Gagal mengambil data");
            return res.json();
        })
        .then(data => {
            dataKalah = data;
            tampilkanSemua();
            if (!intervalUpdate) {
                intervalUpdate = setInterval(hitungSemuaWaktu, 1000);
            }
        })
        .catch(err => {
            document.getElementById("bossContainer").innerHTML = `
                <div class="text-center text-red-400 py-10">
                    <i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
                    <p>${err.message}</p>
                </div>`;
        });
}

// Hitung waktu untuk jadwal tetap
function hitungWaktuTetap(waktuStr) {
    const sekarang = new Date(new Date().toLocaleString("en-US", {timeZone: TIMEZONE}));
    const [jam, menit] = waktuStr.split(":").map(Number);
    let target = new Date(sekarang);
    target.setHours(jam, menit, 0, 0);
    if (sekarang >= target) target.setDate(target.getDate() + 1);
    return target;
}

// Hitung waktu untuk jadwal interval
function hitungWaktuInterval(nama, jam) {
    if (!dataKalah[nama]) return null;
    const kalah = new Date(dataKalah[nama]);
    return new Date(kalah.getTime() + jam * 3600000);
}

// Format waktu ke bentuk jam:menit:detik
function formatWaktu(tanggal) {
    if (!tanggal) return "⏳ Belum tercatat";
    const sekarang = new Date(new Date().toLocaleString("en-US", {timeZone: TIMEZONE}));
    const selisih = tanggal - sekarang;
    
    if (selisih <= 0) return "🔥 SUDAH MUNCUL";
    
    const hari = Math.floor(selisih / 86400000);
    const jam = Math.floor((selisih % 86400000) / 3600000);
    const menit = Math.floor((selisih % 3600000) / 60000);
    const detik = Math.floor((selisih % 60000) / 1000);

    if (hari > 0) return `${hari}h ${jam.toString().padStart(2, '0')}:${menit.toString().padStart(2, '0')}:${detik.toString().padStart(2, '0')}`;
    return `${jam.toString().padStart(2, '0')}:${menit.toString().padStart(2, '0')}:${detik.toString().padStart(2, '0')}`;
}

// Perbarui semua angka detik secara real-time
function hitungSemuaWaktu() {
    const reset = hitungWaktuTetap("05:00");
    document.getElementById("resetTimer").textContent = formatWaktu(reset);

    JADWAL_TETAP.forEach((grup, gIdx) => {
        const waktuDasar = hitungWaktuTetap(grup.waktu[0]);
        grup.daftar.forEach((boss, idx) => {
            const el = document.getElementById(`timer-${grup.nama_grup.replace(/\s/g, '')}-${idx}`);
            if (el) el.textContent = formatWaktu(waktuDasar);
        });
    });

    JADWAL_INTERVAL.forEach((grup, gIdx) => {
        grup.daftar.forEach((boss, idx) => {
            const waktuMuncul = hitungWaktuInterval(boss.nama, grup.interval_jam);
            const el = document.getElementById(`timer-${grup.nama_grup.replace(/\s/g, '')}-${idx}`);
            if (el) el.textContent = formatWaktu(waktuMuncul);
        });
    });
}
