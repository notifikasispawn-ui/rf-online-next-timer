<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF Online Next - Boss Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: "#0f172a",
                        darker: "#020617",
                        accent: "#1e40af"
                    },
                    fontFamily: {
                        game: ["Orbitron", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-gray-900 to-slate-900 text-white min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-game font-bold text-blue-400 mb-3">
                <i class="fa-solid fa-hourglass-half mr-2"></i>RF ONLINE NEXT
            </h1>
            <p class="text-gray-300">Novus World Boss Timer • Zona Waktu: <span class="font-semibold text-yellow-300">WIB (UTC+7)</span></p>
            <p class="text-xs text-gray-400 mt-1">Data dikelola dari server Discord</p>
        </div>

        <!-- Reset Harian -->
        <div class="bg-gradient-to-r from-amber-900/40 to-amber-800/20 rounded-xl p-5 mb-8 border-l-4 border-amber-500 card-shadow">
            <h2 class="text-xl font-semibold text-amber-300 flex items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> Reset Harian
            </h2>
            <div id="resetTimer" class="text-3xl md:text-4xl font-bold text-amber-200 mt-2">--:--:--</div>
        </div>

        <!-- Konten Boss -->
        <div id="bossContainer" class="space-y-8">
            <div class="text-center text-gray-400 py-10">Memuat data...</div>
        </div>

        <footer class="text-center text-gray-500 text-sm mt-12 pt-4 border-t border-gray-800">
            © 2026 RF Online Next Boss Timer • Data dikelola dari Discord
        </footer>
    </div>

    <script>
        // GANTI DENGAN LINK RAW FILE database.json DI GITHUB KAMU
        const DATABASE_URL = "https://raw.githubusercontent.com/notifikasispawn/rf-online-next-timer/main/database.json";
        const TIMEZONE = "Asia/Jakarta";

        const JADWAL_TETAP = [
            {
                "nama_grup": "Novus Boss Group A",
                "waktu": ["12:00", "18:30"],
                "warna": "green",
                "daftar": [
                    {"nama": "Mecha Yusigula", "level": 36, "lokasi": "Mazar Training Ground", "gambar": "https://i.imgur.com/4YbX7QH.png"},
                    {"nama": "Mecha Dagan", "level": 38, "lokasi": "Vulcan Valley", "gambar": "https://i.imgur.com/9Zb8WqL.png"},
                    {"nama": "Subject 13", "level": 40, "lokasi": "Skadi Vale", "gambar": "https://i.imgur.com/7sXpR5d.png"}
                ]
            },
            {
                "nama_grup": "Novus Boss Group B",
                "waktu": ["12:00"],
                "warna": "green",
                "daftar": [
                    {"nama": "2tion", "level": 42, "lokasi": "South Dorian Forest", "gambar": "https://i.imgur.com/2Rk9sTf.png"},
                    {"nama": "Mecha Wild Beast", "level": 48, "lokasi": "Galio Sunken Lands", "gambar": "https://i.imgur.com/5Qe7vWg.png"},
                    {"nama": "Mecha Optic Larva", "level": 48, "lokasi": "Galio Sunken Lands", "gambar": "https://i.imgur.com/8xR3vMh.png"},
                    {"nama": "Rusty Sickle", "level": 49, "lokasi": "Spire Plains", "gambar": "https://i.imgur.com/3pK7y9n.png"}
                ]
            },
            {
                "nama_grup": "Novus Boss Group C",
                "waktu": ["18:30"],
                "warna": "green",
                "daftar": [
                    {"nama": "Mecha Lunker", "level": 50, "lokasi": "Forest of Exiles", "gambar": "https://i.imgur.com/6tM2zXp.png"},
                    {"nama": "Mecha Lizard", "level": 52, "lokasi": "Garden of the Gods", "gambar": "https://i.imgur.com/9aV8bNc.png"},
                    {"nama": "Mecha Temizl", "level": 60, "lokasi": "Pilgrim's Island", "gambar": "https://i.imgur.com/7bNcFgH.png"},
                    {"nama": "Prime Draco", "level": 62, "lokasi": "Fallen Temple", "gambar": "https://i.imgur.com/2zKqV9m.png"}
                ]
            }
        ];

        const JADWAL_INTERVAL = [
            {
                "nama_grup": "Novus Boss Group D",
                "interval_jam": 42,
                "warna": "orange",
                "daftar": [
                    {"nama": "Mecha Tamac", "level": 66, "lokasi": "Blackstone Munitions Factory", "gambar": "https://i.imgur.com/4sLqV9n.png"},
                    {"nama": "Infernal Larva", "level": 67, "lokasi": "Pioneer's Hill", "gambar": "https://i.imgur.com/8yP7R2f.png"},
                    {"nama": "Locust", "level": 68, "lokasi": "Seth Slums", "gambar": "https://i.imgur.com/5cQ9vKp.png"},
                    {"nama": "Mecha Tweezer", "level": 70, "lokasi": "Seth Landfill", "gambar": "https://i.imgur.com/9tR2nMv.png"},
                    {"nama": "Vastus", "level": 74, "lokasi": "Desert of Death", "gambar": "https://i.imgur.com/3zK7mQ8.png"}
                ]
            },
            {
                "nama_grup": "Novus Boss Group E",
                "interval_jam": 48,
                "warna": "red",
                "daftar": [
                    {"nama": "Mecha Warbeast", "level": 76, "lokasi": "Broken Ruins", "gambar": "https://i.imgur.com/7pK2nL9.png"},
                    {"nama": "Mecha Ertelem", "level": 77, "lokasi": "Ramon Desert", "gambar": "https://i.imgur.com/2vR8zXq.png"},
                    {"nama": "Mecha Devourer", "level": 79, "lokasi": "Horizon Base", "gambar": "https://i.imgur.com/6bQ5kM9.png"},
                    {"nama": "e Hook", "level": 80, "lokasi": "Screaming Vale", "gambar": "https://i.imgur.com/9cR3vM2.png"},
                    {"nama": "Eldrige", "level": 81, "lokasi": "Saufa Colony", "gambar": "https://i.imgur.com/4tL7zN8.png"}
                ]
            }
        ];

        let dataKalah = {};

        function ambilDatabase() {
            fetch(DATABASE_URL + "?t=" + Date.now())
                .then(res => res.json())
                .then(data => {
                    dataKalah = data;
                    tampilkanSemua();
                })
                .catch(err => {
                    document.getElementById("bossContainer").innerHTML = `
                        <div class="text-center text-red-400 py-10">
                            <i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
                            <p>Gagal memuat data</p>
                        </div>`;
                });
        }

        function hitungWaktuTetap(waktuStr) {
            const sekarang = new Date(new Date().toLocaleString("en-US", {timeZone: TIMEZONE}));
            const [jam, menit] = waktuStr.split(":").map(Number);
            let target = new Date(sekarang);
            target.setHours(jam, menit, 0, 0);
            if (sekarang >= target) target.setDate(target.getDate() + 1);
            return target;
        }

        function hitungWaktuInterval(nama, jam) {
            if (!dataKalah[nama]) return null;
            const kalah = new Date(dataKalah[nama]);
            return new Date(kalah.getTime() + jam * 3600000);
        }

        function formatWaktu(tanggal) {
            if (!tanggal) return "<span class='text-gray-400'>Belum dicatat</span>";
            const sekarang = new Date(new Date().toLocaleString("en-US", {timeZone: TIMEZONE}));
            const selisih = tanggal - sekarang;
            if (selisih <= 0) return "<span class='text-green-400 font-bold'>SUDAH MUNCUL</span>";
            
            const j = Math.floor(selisih / 3600000);
            const m = Math.floor((selisih % 3600000) / 60000);
            const d = Math.floor((selisih % 60000) / 1000);
            return `${j.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${d.toString().padStart(2, '0')}`;
        }

        function tampilkanSemua() {
            const reset = hitungWaktuTetap("05:00");
            document.getElementById("resetTimer").textContent = formatWaktu(reset).replace(/<[^>]*>/g, '');

            let html = "";

            JADWAL_TETAP.forEach(grup => {
                html += `
                <div class="bg-gray-800/60 rounded-xl p-5 border-l-4 border-${grup.warna}-500 card-shadow">
                    <h2 class="text-xl font-semibold text-${grup.warna}-400 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-calendar-days"></i> ${grup.nama_grup}
                        <span class="text-sm text-gray-400 font-normal">${grup.waktu.join(" & ")} WIB</span>
                    </h2>
                    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${grup.daftar.map(boss => `
                            <div class="bg-gray-700/50 rounded-lg p-3 flex items-center gap-3">
                                <img src="${boss.gambar}" alt="${boss.nama}" class="w-16 h-16 rounded object-cover bg-gray-600">
                                <div class="flex-1">
                                    <h3 class="font-bold text-white">${boss.nama} <span class="text-xs text-gray-300">Lv.${boss.level}</span></h3>
                                    <p class="text-xs text-gray-300 mb-1">📍 ${boss.lokasi}</p>
                                    <div class="text-lg font-semibold text-${grup.warna}-300">${formatWaktu(hitungWaktuTetap(grup.waktu[0]))}</div>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
            });

            JADWAL_INTERVAL.forEach(grup => {
                html += `
                <div class="bg-gray-800/60 rounded-xl p-5 border-l-4 border-${grup.warna}-500 card-shadow">
                    <h2 class="text-xl font-semibold text-${grup.warna}-400 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left"></i> ${grup.nama_grup}
                        <span class="text-sm text-gray-400 font-normal">Interval ${grup.interval_jam} Jam</span>
                    </h2>
                    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${grup.daftar.map(boss => `
                            <div class="bg-gray-700/50 rounded-lg p-3 flex items-center gap-3">
                                <img src="${boss.gambar}" alt="${boss.nama}" class="w-16 h-16 rounded object-cover bg-gray-600">
                                <div class="flex-1">
                                    <h3 class="font-bold text-white">${boss.nama} <span class="text-xs text-gray-300">Lv.${boss.level}</span></h3>
                                    <p class="text-xs text-gray-300 mb-1">📍 ${boss.lokasi}</p>
                                    <div class="text-lg font-semibold text-${grup.warna}-300">${formatWaktu(hitungWaktuInterval(boss.nama, grup.interval_jam))}</div>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
            });

            document.getElementById("bossContainer").innerHTML = html;
        }

        ambilDatabase();
        setInterval(ambilDatabase, 30000);
    </script>
</body>
</html>
