<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF Online Next - Boss Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: "#0f172a",
                        darker: "#020617",
                        accent: "#1e40af"
                    },
                    fontFamily: {
                        game: ["Orbitron", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-gray-900 to-slate-900 text-white min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-game font-bold text-blue-400 mb-3">
                <i class="fa-solid fa-hourglass-half mr-2"></i>RF ONLINE NEXT
            </h1>
            <p class="text-gray-300">Novus World Boss Timer • Zona Waktu: <span class="font-semibold text-yellow-300">WIB (UTC+7)</span></p>
            <p class="text-xs text-gray-400 mt-1">Data terhubung langsung ke server Discord</p>
        </div>

        <!-- Reset Harian -->
        <div class="bg-gradient-to-r from-amber-900/40 to-amber-800/20 rounded-xl p-5 mb-8 border-l-4 border-amber-500 card-shadow">
            <h2 class="text-xl font-semibold text-amber-300 flex items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> Reset Harian
            </h2>
            <div id="resetTimer" class="text-3xl md:text-4xl font-bold text-amber-200 mt-2">--:--:--</div>
        </div>

        <!-- Konten Boss -->
        <div id="bossContainer" class="space-y-8">
            <!-- Konten akan dimuat otomatis dari bot -->
            <div class="text-center text-gray-400 py-10">Memuat data dari server...</div>
        </div>

        <footer class="text-center text-gray-500 text-sm mt-12 pt-4 border-t border-gray-800">
            © 2026 RF Online Next Boss Timer • Data dikelola dari server Discord
        </footer>
    </div>

    <script>
        // Alamat API Bot kamu (ganti dengan alamat IP/Domain Sparked kamu)
        const API_URL = "http://IP_SPARKED_KAMU:8080/api/data";

        function formatWaktu(isoString) {
            if (!isoString) return "<span class='text-gray-500'>Belum tercatat</span>";
            const target = new Date(isoString);
            const sekarang = new Date();
            const selisih = target - sekarang;

            if (selisih <= 0) return "<span class='text-green-400 font-bold'>SUDAH MUNCUL</span>";

            const jam = Math.floor(selisih / 3600000);
            const menit = Math.floor((selisih % 3600000) / 60000);
            const detik = Math.floor((selisih % 60000) / 1000);
            return `${jam.toString().padStart(2, '0')}:${menit.toString().padStart(2, '0')}:${detik.toString().padStart(2, '0')}`;
        }

        async function ambilData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                tampilkanData(data);
            } catch (err) {
                document.getElementById("bossContainer").innerHTML = `
                    <div class="text-center text-red-400 py-10">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
                        <p>Gagal terhubung ke server data</p>
                    </div>`;
            }
        }

        function tampilkanData(data) {
            let html = "";

            // Tampilkan Jadwal Tetap
            data.jadwal_tetap.forEach(grup => {
                html += `
                <div class="bg-gray-800/60 rounded-xl p-5 border-l-4 border-green-500 card-shadow">
                    <h2 class="text-xl font-semibold text-green-400 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-calendar-days"></i> ${grup.nama}
                        <span class="text-sm text-gray-400 font-normal">${grup.waktu.join(" & ")}</span>
                    </h2>
                    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${grup.daftar.map(boss => `
                            <div class="bg-gray-700/50 rounded-lg p-3 flex items-center gap-3">
                                <img src="${boss.gambar}" alt="${boss.nama}" class="w-16 h-16 rounded object-cover bg-gray-600">
                                <div class="flex-1">
                                    <h3 class="font-bold text-white">${boss.nama} <span class="text-xs text-gray-300">Lv.${boss.level}</span></h3>
                                    <p class="text-xs text-gray-300 mb-1">📍 ${boss.lokasi}</p>
                                    <div class="text-lg font-semibold text-green-300">${formatWaktu(boss.waktu_muncul)}</div>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
            });

            // Tampilkan Jadwal Interval
            data.jadwal_interval.forEach(grup => {
                const warna = grup.warna === 0xf39c12 ? "border-orange-500 text-orange-400" : "border-red-500 text-red-400";
                html += `
                <div class="bg-gray-800/60 rounded-xl p-5 border-l-4 ${warna} card-shadow">
                    <h2 class="text-xl font-semibold ${warna.split(" ")[1]} mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left"></i> ${grup.nama}
                        <span class="text-sm text-gray-400 font-normal">Interval ${grup.interval} Jam</span>
                    </h2>
                    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${grup.daftar.map(boss => `
                            <div class="bg-gray-700/50 rounded-lg p-3 flex items-center gap-3">
                                <img src="${boss.gambar}" alt="${boss.nama}" class="w-16 h-16 rounded object-cover bg-gray-600">
                                <div class="flex-1">
                                    <h3 class="font-bold text-white">${boss.nama} <span class="text-xs text-gray-300">Lv.${boss.level}</span></h3>
                                    <p class="text-xs text-gray-300 mb-1">📍 ${boss.lokasi}</p>
                                    <div class="text-lg font-semibold ${grup.warna === 0xf39c12 ? "text-orange-300" : "text-red-300"}">
                                        ${formatWaktu(boss.waktu_muncul)}
                                    </div>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
            });

            document.getElementById("bossContainer").innerHTML = html;
        }

        // Jalankan pertama kali, lalu perbarui setiap 30 detik
        ambilData();
        setInterval(ambilData, 30000);
    </script>
</body>
</html>
