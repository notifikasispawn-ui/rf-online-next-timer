<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF Online Next - Boss Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: "#0f172a",
                        darker: "#020617",
                        accent: "#1e40af",
                        groupA: "#27ae60",
                        groupB: "#27ae60",
                        groupC: "#27ae60",
                        groupD: "#f39c12",
                        groupE: "#e74c3c",
                    },
                    fontFamily: {
                        game: ["Orbitron", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
            .border-l-4 { border-left-width: 4px; }
            .boss-img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 2px solid rgba(255,255,255,0.1); }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-gray-900 to-slate-900 text-white min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-game font-bold text-blue-400 mb-3">
                <i class="fa-solid fa-hourglass-half mr-2"></i>RF ONLINE NEXT
            </h1>
            <p class="text-gray-300">Novus World Boss Timer • Zona Waktu: <span class="font-semibold text-yellow-300">WIB (UTC+7)</span></p>
            <p class="text-xs text-gray-400 mt-1">Data dikelola dari server Discord</p>
        </div>

        <!-- Reset Harian -->
        <div class="bg-gradient-to-r from-amber-900/40 to-amber-800/20 rounded-xl p-5 mb-8 border-l-4 border-amber-500 card-shadow">
            <h2 class="text-xl font-semibold text-amber-300 flex items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> Reset Harian
            </h2>
            <div id="resetTimer" class="text-3xl md:text-4xl font-bold text-amber-200 mt-2">--:--:--</div>
        </div>

        <!-- Konten Boss -->
        <div id="bossContainer" class="space-y-8">
            <div class="text-center text-gray-400 py-10">Memuat data...</div>
        </div>

        <footer class="text-center text-gray-500 text-sm mt-12 pt-4 border-t border-gray-800">
            © 2026 RF Online Next Boss Timer • Data dikelola dari Discord
        </footer>
    </div>

    <script>
        // ✅ Link database sesuai repositori kamu
        const DATABASE_URL = "https://raw.githubusercontent.com/notifikasispawn-ui/rf-online-next-timer/main/database.json";
        const TIMEZONE = "Asia/Jakarta";

        // ✅ Daftar Boss + tempat link gambar
        const JADWAL_TETAP = [
            {
                "nama_grup": "🟢 NOVUS BOSS GROUP A",
                "waktu": ["12:00", "18:30"],
                "warna": "groupA",
                "daftar": [
                    {"nama": "Mecha Yusigula", "level": 36, "lokasi": "Mazar Training Ground", "gambar": "https://imgur.com/NkQPe8n"},
                    {"nama": "Mecha Dagan", "level": 38, "lokasi": "Vulcan Valley", "gambar": "https://imgur.com/LZ0vO9O"},
                    {"nama": "Subject 13", "level": 40, "lokasi": "Skadi Vale", "gambar": "https://imgur.com/1TOjo4v"}
                ]
            },
            {
                "nama_grup": "🟢 NOVUS BOSS GROUP B",
                "waktu": ["12:00"],
                "warna": "groupB",
                "daftar": [
                    {"nama": "2tion", "level": 42, "lokasi": "South Dorian Forest", "gambar": "https://imgur.com/CwPddY2"},
                    {"nama": "Mecha Wild Beast", "level": 48, "lokasi": "Galio Sunken Lands", "gambar": "https://imgur.com/J9WrpIX"},
                    {"nama": "Mecha Optic Larva", "level": 48, "lokasi": "Galio Sunken Lands", "gambar": "https://imgur.com/GrPnFeH"},
                    {"nama": "Rusty Sickle", "level": 49, "lokasi": "Spire Plains", "gambar": "https://imgur.com/jFHZBOy"}
                ]
            },
            {
                "nama_grup": "🟢 NOVUS BOSS GROUP C",
                "waktu": ["18:30"],
                "warna": "groupC",
                "daftar": [
                    {"nama": "Mecha Lunker", "level": 50, "lokasi": "Forest of Exiles", "gambar": "https://imgur.com/gppXLfH"},
                    {"nama": "Mecha Lizard", "level": 52, "lokasi": "Garden of the Gods", "gambar": "https://imgur.com/trWADQ3"},
                    {"nama": "Mecha Temizl", "level": 60, "lokasi": "Pilgrim's Island", "gambar": "https://imgur.com/ZqPoiXg"},
                    {"nama": "Prime Draco", "level": 62, "lokasi": "Fallen Temple", "gambar": "https://imgur.com/OuE2Eci"}
                ]
            }
        ];

        const JADWAL_INTERVAL = [
            {
                "nama_grup": "🟡 NOVUS BOSS GROUP D",
                "interval_jam": 42,
                "warna": "groupD",
                "daftar": [
                    {"nama": "Mecha Tamac", "level": 66, "lokasi": "Blackstone Munitions Factory", "https://imgur.com/BB9PaPH"},
                    {"nama": "Infernal Larva", "level": 67, "lokasi": "Pioneer's Hill", "gambar": "https://imgur.com/Y3ceYk1"},
                    {"nama": "Locust", "level": 68, "lokasi": "Seth Slums", "gambar": "https://imgur.com/SnuGw9w"},
                    {"nama": "Mecha Tweezer", "level": 70, "lokasi": "Seth Landfill", "gambar": "https://imgur.com/t9M1TTF"},
                    {"nama": "Vastus", "level": 74, "lokasi": "Desert of Death", "gambar": "https://imgur.com/KDsvf8m"}
                ]
            },
            {
                "nama_grup": "🔴 NOVUS BOSS GROUP E",
                "interval_jam": 48,
                "warna": "groupE",
                "daftar": [
                    {"nama": "Mecha Warbeast", "level": 76, "lokasi": "Broken Ruins", "gambar": "https://imgur.com/0YByRbX"},
                    {"nama": "Mecha Ertelem", "level": 77, "lokasi": "Ramon Desert", "gambar": "https://imgur.com/IOOz0au"},
                    {"nama": "Mecha Devourer", "level": 79, "lokasi": "Horizon Base", "gambar": "https://imgur.com/Ohls3V9"},
                    {"nama": "e Hook", "level": 80, "lokasi": "Screaming Vale", "gambar": "https://imgur.com/ctxdRyj"},
                    {"nama": "Eldrige", "level": 81, "lokasi": "Saufa Colony", "gambar": "https://imgur.com/IUqPxE1"}
                ]
            }
        ];

        let dataKalah = {};
        let intervalUpdate = null;

        function ambilDatabase() {
            fetch(DATABASE_URL + "?t=" + Date.now(), { cache: "no-store" })
                .then(res => {
                    if (!res.ok) throw new Error("Gagal memuat data");
                    return res.json();
                })
                .then(data => {
                    dataKalah = data;
                    tampilkanSemua();
                    if (!intervalUpdate) {
                        intervalUpdate = setInterval(hitungSemuaWaktu, 1000);
                    }
                })
                .catch(err => {
                    document.getElementById("bossContainer").innerHTML = `
                        <div class="text-center text-red-400 py-10">
                            <i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
                            <p>${err.message}</p>
                        </div>`;
                });
        }

        function hitungWaktuTetap(waktuStr) {
            const sekarang = new Date(new Date().toLocaleString("en-US", {timeZone: TIMEZONE}));
            const [jam, menit] = waktuStr.split(":").map(Number);
            let target = new Date(sekarang);
            target.setHours(jam, menit, 0, 0);
            if (sekarang >= target) target.setDate(target.getDate() + 1);
            return target;
        }

        function hitungWaktuInterval(nama, jam) {
            if (!dataKalah[nama]) return null;
            const kalah = new Date(dataKalah[nama]);
            return new Date(kalah.getTime() + jam * 3600000);
        }

        function formatWaktu(tanggal) {
            if (!tanggal) return "⏳ Belum tercatat";
            const sekarang = new Date(new Date().toLocaleString("en-US", {timeZone: TIMEZONE}));
            const selisih = tanggal - sekarang;
            
            if (selisih <= 0) return "🔥 SUDAH MUNCUL";
            
            const hari = Math.floor(selisih / 86400000);
            const jam = Math.floor((selisih % 86400000) / 3600000);
            const menit = Math.floor((selisih % 3600000) / 60000);
            const detik = Math.floor((selisih % 60000) / 1000);

            if (hari > 0) return `${hari}h ${jam.toString().padStart(2, '0')}:${menit.toString().padStart(2, '0')}:${detik.toString().padStart(2, '0')}`;
            return `${jam.toString().padStart(2, '0')}:${menit.toString().padStart(2, '0')}:${detik.toString().padStart(2, '0')}`;
        }

        function tampilkanSemua() {
            const reset = hitungWaktuTetap("05:00");
            document.getElementById("resetTimer").textContent = formatWaktu(reset);

            let html = "";

            JADWAL_TETAP.forEach(grup => {
                html += `
                <div class="bg-gray-800/60 rounded-xl p-5 border-l-4 border-${grup.warna} card-shadow">
                    <h2 class="text-xl font-semibold text-${grup.warna} mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-calendar-days"></i> ${grup.nama_grup}
                        <span class="text-sm text-gray-400 font-normal">• ${grup.waktu.join(" & ")} WIB</span>
                    </h2>
                    <div class="space-y-3">
                        ${grup.daftar.map((boss, idx) => `
                            <div class="bg-gray-700/50 rounded-lg p-4 flex items-center gap-4">
                                <img src="${boss.gambar}" alt="${boss.nama}" class="boss-img" loading="lazy">
                                <div class="flex-1">
                                    <h3 class="font-bold text-white text-lg">${boss.nama} <span class="text-sm text-gray-300">Lv.${boss.level}</span></h3>
                                    <p class="text-sm text-gray-300 mt-1 flex items-center gap-1">
                                        <i class="fa-solid fa-location-dot"></i> ${boss.lokasi}
                                    </p>
                                </div>
                                <div id="timer-${grup.nama_grup.replace(/\s/g, '')}-${idx}" class="text-xl font-semibold text-${grup.warna} w-32 text-right">
                                    --:--:--
                                </div>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
            });

            JADWAL_INTERVAL.forEach(grup => {
                html += `
                <div class="bg-gray-800/60 rounded-xl p-5 border-l-4 border-${grup.warna} card-shadow">
                    <h2 class="text-xl font-semibold text-${grup.warna} mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left"></i> ${grup.nama_grup}
                        <span class="text-sm text-gray-400 font-normal">• Interval ${grup.interval_jam} Jam</span>
                    </h2>
                    <div class="space-y-3">
                        ${grup.daftar.map((boss, idx) => `
                            <div class="bg-gray-700/50 rounded-lg p-4 flex items-center gap-4">
                                <img src="${boss.gambar}" alt="${boss.nama}" class="boss-img" loading="lazy">
                                <div class="flex-1">
                                    <h3 class="font-bold text-white text-lg">${boss.nama} <span class="text-sm text-gray-300">Lv.${boss.level}</span></h3>
                                    <p class="text-sm text-gray-300 mt-1 flex items-center gap-1">
                                        <i class="fa-solid fa-location-dot"></i> ${boss.lokasi}
                                    </p>
                                </div>
                                <div id="timer-${grup.nama_grup.replace(/\s/g, '')}-${idx}" class="text-xl font-semibold text-${grup.warna} w-32 text-right">
                                    --:--:--
                                </div>
                            </div>
                        `).join("")}
                    </div>
                </div>`;
            });

            document.getElementById("bossContainer").innerHTML = html;
            hitungSemuaWaktu();
        }

        function hitungSemuaWaktu() {
            const reset = hitungWaktuTetap("05:00");
            document.getElementById("resetTimer").textContent = formatWaktu(reset);

            JADWAL_TETAP.forEach((grup) => {
                const waktu = hitungWaktuTetap(grup.waktu[0]);
                grup.daftar.forEach((boss, idx) => {
                    const el = document.getElementById(`timer-${grup.nama_grup.replace(/\s/g, '')}-${idx}`);
                    if (el) el.textContent = formatWaktu(waktu);
                });
            });

            JADWAL_INTERVAL.forEach((grup) => {
                grup.daftar.forEach((boss, idx) => {
                    const waktu = hitungWaktuInterval(boss.nama, grup.interval_jam);
                    const el = document.getElementById(`timer-${grup.nama_grup.replace(/\s/g, '')}-${idx}`);
                    if (el) el.textContent = formatWaktu(waktu);
                });
            });
        }

        ambilDatabase();
        setInterval(ambilDatabase, 120000);
    </script>
</body>
</html>
